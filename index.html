<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a1208">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vehicle Racer">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Multi-Vehicle Racer</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">

  <style>
    :root {
      color-scheme: dark;
      background: #080908;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: #080908;
      touch-action: none;
      position: fixed;
      inset: 0;
    }

    body {
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    #game {
      display: block;
      width: 100%;
      height: 100%;
      background: #080908;
      touch-action: none;
    }

    #rotateNotice {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(4, 7, 4, 0.96);
      color: white;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      font: 700 24px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #rotateNotice small {
      display: block;
      margin-top: 12px;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
    }
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Multi-Vehicle Racer"></canvas>


  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }

    document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
    document.addEventListener("gesturechange", e => e.preventDefault(), { passive: false });
    document.addEventListener("gestureend", e => e.preventDefault(), { passive: false });
    document.addEventListener("contextmenu", e => e.preventDefault());

    const requestGameFullscreen = async () => {
      const element = document.documentElement;
      try {
        if (element.requestFullscreen && !document.fullscreenElement) {
          await element.requestFullscreen();
        }
      } catch (_) {}
    };

    window.addEventListener("pointerdown", requestGameFullscreen, { once: true });
  </script>
</body>
</html>
